name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Instalar (com deps de dev)
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Testes (pytest)
        run: pytest

  # Publicação no PyPI ao criar uma tag "v*" (ex.: v0.1.0).
  # Usa Trusted Publishing (OIDC) — SEM guardar token/senha no repositório.
  # TODO(voce): antes do primeiro release, configurar o "pending publisher"
  # em https://pypi.org/manage/account/publishing/ apontando para este repo.
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Publicar no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1